<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Links</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #1e1e1e, #2c2c2c);
        color: white;
        text-align: center;
    }

    .container {
        max-width: 600px;
        margin: auto;
        padding: 30px 20px;
    }

    h1 {
        margin-bottom: 30px;
        font-size: 28px;
        letter-spacing: 2px;
    }

    .section-title {
        margin-top: 30px;
        font-size: 20px;
        border-bottom: 2px solid #555;
        padding-bottom: 5px;
        text-align: left;
    }

    .link-box {
        display: block;
        background: #333;
        color: white;
        text-decoration: none;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        transition: 0.3s;
    }

    .link-box:hover {
        background: #555;
    }
</style>
</head>

<body>

<div class="container">
    <h1>MY LINKS</h1>

    <!-- Mobile Section -->
    <div class="section-title">📱 Mobile</div>

    <a href="https://example.com/mobile1" class="link-box">Mobile Link 1</a>
    <a href="https://example.com/mobile2" class="link-box">Mobile Link 2</a>

    <!-- Computer Section -->
    <div class="section-title">💻 Computer</div>

    <a href="https://example.com/pc1" class="link-box">Computer Link 1</a>
    <a href="https://example.com/pc2" class="link-box">Computer Link 2</a>

    <!-- Modedd Section -->
    <div class="section-title">🔥 Modedd</div>

    <a href="https://an1.com/" class="link-box">An1</a>
    <a href="https://example.com/mod2" class="link-box">Modedd Link 2</a>

</div>

</body>
</html>
